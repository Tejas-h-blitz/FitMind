version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: fitmind-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: fitmind-rag
    ports:
      - "8000:8000"
    env_file:
      - ./rag-service/.env
    depends_on:
      - qdrant
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitmind-backend
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - qdrant
      - rag-service
    restart: unless-stopped

volumes:
  qdrant_data:
